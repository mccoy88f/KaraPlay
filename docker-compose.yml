# KaraPlay — stack di produzione.
# Avvio locale:      docker compose up -d --build
# Portainer:         Stacks → Add stack → Repository
#                    URL del repo, branch "main", compose path "docker-compose.yml".
#                    Portainer clona il repo e builda le immagini da solo.
# App su  http://<host>:8080  (pubblico /join, host /admin, schermo /display, palco /stage)

services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://karaoke:password@db:5432/karaokedb
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@localhost}
      STORAGE_PATH: /app/storage
      # Opzionale: file cookies Netscape già montato (ha priorità sul caricamento da admin)
      YOUTUBE_COOKIES_PATH: ${YOUTUBE_COOKIES_PATH:-}
    volumes:
      - karaoke-storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: karaoke
      POSTGRES_PASSWORD: password
      POSTGRES_DB: karaokedb
    volumes:
      - karaoke-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karaoke -d karaokedb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  karaoke-storage:
  karaoke-pgdata:
